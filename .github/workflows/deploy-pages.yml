name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
      - name: Node.js 준비
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: GitHub Pages 준비
        uses: actions/configure-pages@v5
      - name: 패키지 설치
        run: npm ci
      - name: 정적 사이트 빌드
        env:
          GITHUB_PAGES: "true"
        run: npx next build
      - name: Pages 파일 준비
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 게시
        id: deployment
        uses: actions/deploy-pages@v4
